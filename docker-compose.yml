services:
  sunarp-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sunarp-api
    init: true
    shm_size: "1gb"
    ports:
      - "${SUNARP_PUBLIC_PORT:-8010}:8000"
    environment:
      SUNARP_HOST: 0.0.0.0
      SUNARP_PORT: 8000
      SUNARP_HEADLESS: ${SUNARP_HEADLESS:-false}
      SUNARP_SLOW_MODE: ${SUNARP_SLOW_MODE:-false}
      SUNARP_CHROMIUM_PATH: /usr/bin/chromium
      SUNARP_TOTAL_BUDGET_SECONDS: ${SUNARP_TOTAL_BUDGET_SECONDS:-18}
      SUNARP_GATE_INITIAL_SECONDS: ${SUNARP_GATE_INITIAL_SECONDS:-8}
      SUNARP_GATE_RETRY_SECONDS: ${SUNARP_GATE_RETRY_SECONDS:-4}
      SUNARP_API_WAIT_SECONDS: ${SUNARP_API_WAIT_SECONDS:-6}
      SUNARP_NO_PROGRESS_FAIL_SECONDS: ${SUNARP_NO_PROGRESS_FAIL_SECONDS:-3.5}
      SUNARP_PROGRESS_EXTENSION_SECONDS: ${SUNARP_PROGRESS_EXTENSION_SECONDS:-6}
      SUNARP_MAX_PROGRESS_EXTENSIONS: ${SUNARP_MAX_PROGRESS_EXTENSIONS:-2}
      SUNARP_MAX_SUBMIT_ATTEMPTS: ${SUNARP_MAX_SUBMIT_ATTEMPTS:-2}
      SUNARP_REQUIRE_TOKEN_ON_RETRY: ${SUNARP_REQUIRE_TOKEN_ON_RETRY:-true}
      SUNARP_TOTAL_BUDGET_SLOW_SECONDS: ${SUNARP_TOTAL_BUDGET_SLOW_SECONDS:-75}
      SUNARP_GATE_INITIAL_SECONDS_SLOW: ${SUNARP_GATE_INITIAL_SECONDS_SLOW:-20}
      SUNARP_GATE_RETRY_SECONDS_SLOW: ${SUNARP_GATE_RETRY_SECONDS_SLOW:-12}
      SUNARP_API_WAIT_SECONDS_SLOW: ${SUNARP_API_WAIT_SECONDS_SLOW:-16}
      SUNARP_NO_PROGRESS_FAIL_SECONDS_SLOW: ${SUNARP_NO_PROGRESS_FAIL_SECONDS_SLOW:-8}
      SUNARP_MAX_PROGRESS_EXTENSIONS_SLOW: ${SUNARP_MAX_PROGRESS_EXTENSIONS_SLOW:-4}
      SUNARP_MAX_SUBMIT_ATTEMPTS_SLOW: ${SUNARP_MAX_SUBMIT_ATTEMPTS_SLOW:-3}
    command:
      [
        "xvfb-run",
        "-a",
        "-s",
        "-screen 0 1920x1080x24",
        "python",
        "main.py",
      ]
    volumes:
      - ./downloads:/app/downloads
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    restart: unless-stopped
